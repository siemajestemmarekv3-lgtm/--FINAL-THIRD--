<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinalThird Beta</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #f4f4f5;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .brand {
      color: #34d399;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      font-size: 12px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.05;
    }

    .subtitle {
      color: #a1a1aa;
      margin-top: 12px;
      max-width: 700px;
      line-height: 1.5;
    }

    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stat-card,
    .panel {
      background: #111214;
      border: 1px solid #27272a;
      border-radius: 22px;
    }

    .stat-card {
      min-width: 150px;
      padding: 14px 18px;
    }

    .stat-label {
      color: #a1a1aa;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.45fr 0.95fr;
      gap: 24px;
    }

    .grid-panel {
      padding: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
    }

    .header-cell,
    .corner-cell,
    .cell {
      min-height: 112px;
      border-radius: 18px;
      border: 1px solid #27272a;
      background: #09090b;
      padding: 14px;
    }

    .header-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 600;
    }

    .header-type {
      color: #71717a;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .cell {
      cursor: pointer;
      transition: 0.18s ease;
      text-align: left;
      color: inherit;
      width: 100%;
    }

    .cell:hover {
      border-color: #52525b;
    }

    .cell.selected {
      border-color: #34d399;
      background: rgba(52, 211, 153, 0.08);
    }

    .cell.filled {
      box-shadow: inset 0 0 0 1px rgba(52, 211, 153, 0.35);
      background: rgba(52, 211, 153, 0.08);
    }

    .cell-meta {
      font-size: 11px;
      color: #71717a;
      margin-bottom: 12px;
    }

    .cell-value {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      word-break: break-word;
    }

    .side {
      display: grid;
      gap: 18px;
    }

    .panel {
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 8px 0;
      font-size: 22px;
    }

    .muted {
      color: #a1a1aa;
      font-size: 14px;
      line-height: 1.5;
    }

    .input {
      width: 100%;
      background: #09090b;
      color: #f4f4f5;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
      margin-top: 14px;
    }

    .input:focus {
      border-color: #34d399;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: #34d399;
      color: #06130f;
      flex: 1;
    }

    .secondary {
      background: transparent;
      color: #f4f4f5;
      border: 1px solid #3f3f46;
    }

    .suggestions {
      margin-top: 16px;
    }

    .suggestions-title {
      font-size: 11px;
      color: #71717a;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: transparent;
      color: #f4f4f5;
      border: 1px solid #3f3f46;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 500;
    }

    .rules {
      margin: 0;
      padding-left: 18px;
      color: #d4d4d8;
      line-height: 1.6;
      font-size: 14px;
    }

    .error-box {
      background: #1a0f12;
      border: 1px solid #4c1d27;
      color: #fca5a5;
      border-radius: 18px;
      padding: 16px;
      margin-top: 18px;
      line-height: 1.5;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .overlay.show {
      display: flex;
    }

    .win-modal {
      width: 100%;
      max-width: 520px;
      background: #111214;
      border: 1px solid #27272a;
      border-radius: 24px;
      padding: 28px;
      text-align: center;
    }

    .win-modal h2 {
      margin: 0 0 12px 0;
      font-size: 34px;
    }

    .win-modal p {
      margin: 0 0 18px 0;
      color: #d4d4d8;
      line-height: 1.55;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 700px) {
      .page { padding: 16px; }
      h1 { font-size: 32px; }
      .grid { gap: 8px; }
      .header-cell, .corner-cell, .cell {
        min-height: 94px;
        padding: 10px;
        border-radius: 14px;
      }
      .cell-value { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <div class="brand">FinalThird</div>
        <h1>Beta HTML prototype</h1>
        <div class="subtitle">
          Live grid powered by your own <strong>players.json</strong> and <strong>grid.json</strong> files.
          Put all three files in the same folder and open this page through a local server.
        </div>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Filled cells</div>
          <div class="stat-value" id="filledStat">0/9</div>
        </div>
      </div>
    </div>

    <div id="app"></div>
  </div>

  <div class="overlay" id="winOverlay">
    <div class="win-modal">
      <h2>Victory</h2>
      <p>You filled the whole grid. The board is complete.</p>
      <div class="button-row" style="justify-content:center;">
        <button class="primary" id="playAgainBtn" type="button">Play again</button>
      </div>
    </div>
  </div>

  <script>
    const state = {
      players: [],
      conditionPool: [],
      rows: [],
      cols: [],
      board: Array.from({ length: 3 }, () => Array(3).fill(null)),
      selectedCell: null,
      query: "",
      loadError: null,
      hasWon: false
    };

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeText(value) {
      return String(value)
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function shuffle(array) {
      const arr = array.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = arr[i];
        arr[i] = arr[j];
        arr[j] = tmp;
      }
      return arr;
    }

    function checkPlayerCondition(player, condition) {
      if (condition.type === "club") {
        return Array.isArray(player.clubs) && player.clubs.includes(condition.value);
      }
      if (condition.type === "nationality") {
        return player.nationality === condition.value;
      }
      if (condition.type === "league") {
        return Array.isArray(player.leagues) && player.leagues.includes(condition.value);
      }
      if (condition.type === "position") {
        return Array.isArray(player.positions) && player.positions.includes(condition.value);
      }
      return false;
    }

    function checkTwoConditions(player, a, b) {
      return checkPlayerCondition(player, a) && checkPlayerCondition(player, b);
    }

    function validAnswersForConditions(rowCondition, colCondition) {
      return state.players.filter(function (p) {
        return checkTwoConditions(p, rowCondition, colCondition);
      });
    }

    function validAnswersForCell(rowIndex, colIndex) {
      const row = state.rows[rowIndex];
      const col = state.cols[colIndex];
      return validAnswersForConditions(row, col);
    }

    function boardFull() {
      return state.board.every(function (row) {
        return row.every(Boolean);
      });
    }

    function findExactPlayer(name) {
      const normalized = normalizeText(name);
      return state.players.find(function (p) {
        return normalizeText(p.name) === normalized;
      }) || null;
    }

    function isPlayerUsedElsewhere(playerName, rowToIgnore, colToIgnore) {
      const normalizedTarget = normalizeText(playerName);

      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
          if (r === rowToIgnore && c === colToIgnore) continue;
          const current = state.board[r][c];
          if (current && normalizeText(current) === normalizedTarget) {
            return true;
          }
        }
      }

      return false;
    }

    function getSuggestions() {
      const q = normalizeText(state.query);
      if (!q) return [];

      let source = state.players;
      if (state.selectedCell) {
        source = validAnswersForCell(state.selectedCell.row, state.selectedCell.col);
      }

      return source.filter(function (p) {
        return normalizeText(p.name).includes(q);
      }).slice(0, 8);
    }

    function getFilledCount() {
      let count = 0;
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
          if (state.board[r][c]) count++;
        }
      }
      return count;
    }

    function uniquePlayersByName(players) {
      const seen = new Set();
      const result = [];

      for (const player of players) {
        const key = normalizeText(player.name);
        if (!seen.has(key)) {
          seen.add(key);
          result.push(player);
        }
      }

      return result;
    }

    function canAssignNineUniquePlayers(cells) {
      const sorted = cells
        .map(function (cell) {
          return {
            candidates: uniquePlayersByName(cell.answers)
          };
        })
        .sort(function (a, b) {
          return a.candidates.length - b.candidates.length;
        });

      const used = new Set();

      function backtrack(i) {
        if (i === sorted.length) return true;

        const candidates = shuffle(sorted[i].candidates);

        for (const player of candidates) {
          const key = normalizeText(player.name);
          if (used.has(key)) continue;

          used.add(key);
          if (backtrack(i + 1)) return true;
          used.delete(key);
        }

        return false;
      }

      return backtrack(0);
    }

    function buildConditionPoolFromGrid(grid) {
      if (!grid || !grid.conditions) {
        throw new Error("grid.json is missing conditions.");
      }

      const result = [];

      const mapping = [
        { key: "club", type: "club" },
        { key: "nationality", type: "nationality" },
        { key: "league", type: "league" },
        { key: "position", type: "position" }
      ];

      mapping.forEach(function (entry) {
        const values = grid.conditions[entry.key];

        if (!Array.isArray(values)) {
          throw new Error("grid.json conditions." + entry.key + " must be an array.");
        }

        values.forEach(function (value) {
          result.push({
            type: entry.type,
            value: value
          });
        });
      });

      return result;
    }

    function generateRandomBoardFromGrid() {
      if (!Array.isArray(state.conditionPool) || state.conditionPool.length < 6) {
        throw new Error("grid.json must contain enough conditions.");
      }

      for (let attempt = 0; attempt < 4000; attempt++) {
        const shuffled = shuffle(state.conditionPool);
        const rows = shuffled.slice(0, 3);
        const cols = shuffled.slice(3, 6);

        let invalid = false;
        const cells = [];

        for (let r = 0; r < 3; r++) {
          for (let c = 0; c < 3; c++) {
            if (rows[r].type === cols[c].type) {
              invalid = true;
              break;
            }

            const answers = validAnswersForConditions(rows[r], cols[c]);

            if (!answers.length) {
              invalid = true;
              break;
            }

            cells.push({
              row: r,
              col: c,
              answers: answers
            });
          }

          if (invalid) break;
        }

        if (invalid) continue;
        if (!canAssignNineUniquePlayers(cells)) continue;

        state.rows = rows;
        state.cols = cols;
        return;
      }

      throw new Error("Could not generate a valid random board from current players.json and grid.json.");
    }

    function submitPlayer() {
      if (!state.selectedCell) return;

      const player = findExactPlayer(state.query);
      if (!player) return;

      const row = state.selectedCell.row;
      const col = state.selectedCell.col;
      const currentPlayer = state.board[row][col];

      if (!checkTwoConditions(player, state.rows[row], state.cols[col])) return;
      if (isPlayerUsedElsewhere(player.name, row, col)) return;
      if (currentPlayer && normalizeText(currentPlayer) === normalizeText(player.name)) return;

      state.board[row][col] = player.name;
      state.query = "";
      state.hasWon = boardFull();

      render();

      if (state.hasWon) {
        document.getElementById("winOverlay").classList.add("show");
      }
    }

    function clearSelection() {
      state.selectedCell = null;
      state.query = "";
      render();
    }

    function resetBoard() {
      state.board = Array.from({ length: 3 }, function () {
        return Array(3).fill(null);
      });
      state.selectedCell = null;
      state.query = "";
      state.hasWon = false;
      document.getElementById("winOverlay").classList.remove("show");
      render();
    }

    function generateNewBoard() {
      state.board = Array.from({ length: 3 }, function () {
        return Array(3).fill(null);
      });
      state.selectedCell = null;
      state.query = "";
      state.hasWon = false;
      state.loadError = null;
      document.getElementById("winOverlay").classList.remove("show");

      try {
        generateRandomBoardFromGrid();
      } catch (error) {
        state.loadError = error.message;
      }

      render();
    }

    function selectedLabel() {
      if (!state.selectedCell) return "No cell selected yet.";

      const row = state.selectedCell.row;
      const col = state.selectedCell.col;
      const current = state.board[row][col];

      if (current) {
        return "Selected: " + state.rows[row].value + " + " + state.cols[col].value + " | current player: " + current;
      }

      return "Selected: " + state.rows[row].value + " + " + state.cols[col].value;
    }

    function renderSuggestions() {
      const box = document.getElementById("suggestionsBox");
      if (!box) return;

      const suggestions = getSuggestions();

      if (!suggestions.length) {
        box.innerHTML = "";
        return;
      }

      let html = "";
      html += '<div class="suggestions">';
      html += '<div class="suggestions-title">Suggestions</div>';
      html += '<div class="chips">';

      suggestions.forEach(function (player) {
        html += '<button type="button" class="chip suggestion-chip" data-name="' + escapeHtml(player.name) + '">' + escapeHtml(player.name) + "</button>";
      });

      html += "</div></div>";
      box.innerHTML = html;

      box.querySelectorAll(".suggestion-chip").forEach(function (button) {
        button.addEventListener("click", function () {
          state.query = button.dataset.name;
          const input = document.getElementById("playerInput");
          if (input) {
            input.value = state.query;
            input.focus();
          }
          updatePanelsOnly();
        });
      });
    }

    function updateStats() {
      document.getElementById("filledStat").textContent = getFilledCount() + "/9";
    }

    function updatePanelsOnly() {
      updateStats();

      const selectedInfo = document.getElementById("selectedInfo");
      const submitBtn = document.getElementById("submitBtn");

      if (selectedInfo) selectedInfo.textContent = selectedLabel();
      if (submitBtn) submitBtn.disabled = !state.query.trim();

      renderSuggestions();
    }

    function render() {
      const app = document.getElementById("app");
      updateStats();

      if (state.loadError) {
        app.innerHTML = '<div class="error-box">' + escapeHtml(state.loadError) + "</div>";
        return;
      }

      let html = "";

      html += '<div class="layout">';
      html += '<div class="panel grid-panel">';
      html += '<div class="grid">';
      html += '<div class="corner-cell"></div>';

      state.cols.forEach(function (col) {
        html += '<div class="header-cell"><div><div class="header-type">' + escapeHtml(col.type) + "</div><div>" + escapeHtml(col.value) + "</div></div></div>";
      });

      state.rows.forEach(function (row, r) {
        html += '<div class="header-cell"><div><div class="header-type">' + escapeHtml(row.type) + "</div><div>" + escapeHtml(row.value) + "</div></div></div>";

        state.cols.forEach(function (col, c) {
          const selected = state.selectedCell && state.selectedCell.row === r && state.selectedCell.col === c;
          const filled = !!state.board[r][c];
          const validCount = validAnswersForCell(r, c).length;

          let classes = "cell";
          if (selected) classes += " selected";
          if (filled) classes += " filled";

          html += '<button type="button" class="' + classes + '" data-row="' + r + '" data-col="' + c + '">';
          html += '<div class="cell-meta">' + validCount + " valid</div>";
          html += '<div class="cell-value">' + escapeHtml(state.board[r][c] || "Select this cell") + "</div>";
          html += "</button>";
        });
      });

      html += "</div></div>";

      html += '<div class="side">';
      html += '<div class="panel">';
      html += "<h2>Play</h2>";
      html += '<div class="muted" id="selectedInfo">' + escapeHtml(selectedLabel()) + "</div>";
      html += '<input class="input" id="playerInput" placeholder="Type player name" value="' + escapeHtml(state.query) + '" />';
      html += '<div class="button-row">';
      html += '<button type="button" class="primary" id="submitBtn">Submit answer</button>';
      html += '<button type="button" class="secondary" id="clearBtn">Clear</button>';
      html += '<button type="button" class="secondary" id="resetBtn">Reset board</button>';
      html += '<button type="button" class="secondary" id="newBoardBtn">New board</button>';
      html += "</div>";
      html += '<div id="suggestionsBox"></div>';
      html += "</div>";

      html += '<div class="panel">';
      html += "<h2>Rules</h2>";
      html += '<ul class="rules">';
      html += "<li>One player per cell.</li>";
      html += "<li>You can edit a filled cell later.</li>";
      html += "<li>A player must match both conditions.</li>";
      html += "<li>You cannot reuse the same player.</li>";
      html += "</ul>";
      html += "</div>";

      html += "</div></div>";

      app.innerHTML = html;

      document.querySelectorAll(".cell").forEach(function (button) {
        button.addEventListener("click", function () {
          const row = Number(button.dataset.row);
          const col = Number(button.dataset.col);

          state.selectedCell = { row: row, col: col };
          state.query = state.board[row][col] || "";
          render();

          const input = document.getElementById("playerInput");
          if (input) {
            input.focus();
            input.select();
          }
        });
      });

      const input = document.getElementById("playerInput");
      if (input) {
        input.addEventListener("input", function (e) {
          state.query = e.target.value;
          updatePanelsOnly();
        });

        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter") submitPlayer();
        });
      }

      const submitBtn = document.getElementById("submitBtn");
      const clearBtn = document.getElementById("clearBtn");
      const resetBtn = document.getElementById("resetBtn");
      const newBoardBtn = document.getElementById("newBoardBtn");

      if (submitBtn) {
        submitBtn.disabled = !state.query.trim();
        submitBtn.addEventListener("click", submitPlayer);
      }

      if (clearBtn) clearBtn.addEventListener("click", clearSelection);
      if (resetBtn) resetBtn.addEventListener("click", resetBoard);
      if (newBoardBtn) newBoardBtn.addEventListener("click", generateNewBoard);

      renderSuggestions();
    }

    async function loadData() {
      try {
        state.loadError = null;

        const responses = await Promise.all([
          fetch("./players.json?ts=" + Date.now()),
          fetch("./grid.json?ts=" + Date.now())
        ]);

        const playersResponse = responses[0];
        const gridResponse = responses[1];

        if (!playersResponse.ok || !gridResponse.ok) {
          throw new Error("Could not load players.json or grid.json. Keep them in the same folder as this HTML file and run a local server.");
        }

        state.players = await playersResponse.json();
        const grid = await gridResponse.json();

        if (!Array.isArray(state.players) || !state.players.length) {
          throw new Error("players.json is empty or invalid.");
        }

        state.conditionPool = buildConditionPoolFromGrid(grid);

        if (state.conditionPool.length < 6) {
          throw new Error("grid.json must contain at least 6 total conditions.");
        }

        generateRandomBoardFromGrid();
        render();
      } catch (error) {
        state.loadError = error.message + " Example: in the project folder run: python -m http.server 8000 then open http://localhost:8000/";
        render();
      }
    }

    document.getElementById("playAgainBtn").addEventListener("click", resetBoard);

    loadData();
  </script>
</body>
</html>
